experience:
  - role: Research Assistant
    org: Laboratory for Fluid Dynamics in Nature (FINLAB), Virginia Tech
    start: 2022-01-01
    summary: |
      Performing computational research on insect respiratory transport using OpenFOAM, OpenLB, Python, C++, high-performance computing, and direct simulation Monte Carlo (DSMC). Investigating hydrodynamic slip, rarefied gas effects, tracheal microstructures, and microscale-informed modifications to Murray’s law for biological transport networks.

  - role: Instructor of Record
    org: Department of Mechanical Engineering, Virginia Tech
    start: 2025-01-01
    end: 2025-12-31
    summary: |
      Taught Thermodynamics (ME-2134), including lecture delivery, assessment preparation, grading, course management, and student support.

  - role: Teaching Assistant
    org: Virginia Tech
    start: 2021-08-01
    summary: |
      Assisted courses including Fluid Mechanics: Control Volumes, Dynamics, Thermodynamics, and Engineering Analysis of Physiological Systems.

  - role: Research Fellow
    org: BIOTRANS / STRETCH Lab, Virginia Tech
    start: 2022-01-01
    end: 2022-12-31
    summary: |
      Quantified collagen fiber waviness from SHG image stacks using CT-FIRE, straightness metrics, and orientation analysis. Evaluated algorithm performance for highly wavy and non-uniform fiber images.

  - role: Research Fellow
    org: BIOTRANS / Socha Lab, Virginia Tech
    start: 2021-01-01
    end: 2021-12-31
    summary: |
      Assembled and operationalized a Leica RM2125RTS rotary microtome, supported protocol development, and documented procedures for repeatable tissue sectioning.

  - role: Research Assistant
    org: Computational & Flow Science Research Laboratory, Oklahoma State University
    start: 2017-08-01
    end: 2019-12-31
    summary: |
      Conducted direct numerical simulations of turbulent wavy-channel flow using Fortran, Incompact3D, MPI, Python, HPC resources, immersed boundary methods, and ANSYS Fluent. Developed post-processing pipelines and performed data-driven turbulence analysis for LES-relevant modeling.

  - role: Research Assistant
    org: Oklahoma State University / Baker Hughes GE Project
    start: 2018-01-01
    end: 2018-12-31
    summary: |
      Developed Python-based atmospheric plume dispersion and sparse-reconstruction source inversion models for remote leak detection using limited concentration data.

  - role: Teaching Assistant
    org: Oklahoma State University
    start: 2017-08-01
    end: 2019-12-31
    summary: |
      Assisted Engineering Analysis & Methods and Thermodynamics II in the Department of Mechanical and Aerospace Engineering.

  - role: Engineering Intern
    org: Bangladesh Atomic Energy Commission
    start: 2016-01-01
    end: 2016-12-31
    summary: |
      Inspected structural safety, control rod operation, and cooling water regulation in a 3 MW nuclear research reactor.

